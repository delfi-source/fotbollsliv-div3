name: Scrape Division 3 data

on:
  schedule:
    - cron: "0 4-21 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - run: python scraper.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/api/
          git diff --cached --quiet || git commit -m "uppdaterad data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
